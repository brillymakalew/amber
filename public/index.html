<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#1a0f0a" />
<title>Ember · Calorie Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-0: #150b07;
    --bg-1: #1f120a;
    --ember: #ff7a18;
    --ember-2: #ffb347;
    --rose: #ff5d73;
    --cream: #fff4e6;
    --muted: #c9a98f;
    --glass: rgba(255, 244, 230, 0.06);
    --glass-brd: rgba(255, 244, 230, 0.12);
    --display: 'Fraunces', Georgia, serif;
    --body: 'Outfit', system-ui, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: var(--body);
    color: var(--cream);
    background: radial-gradient(120% 80% at 50% -10%, #3a1d0d 0%, var(--bg-1) 40%, var(--bg-0) 100%);
    overflow-x: hidden;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* particle canvas */
  #particles {
    position: fixed; inset: 0; z-index: 0;
    pointer-events: none;
  }

  .wrap {
    position: relative; z-index: 1;
    max-width: 480px; margin: 0 auto;
    padding: 28px 20px 120px;
  }

  /* header */
  header { text-align: center; margin-bottom: 26px; animation: fadeDown .8s ease both; }
  .logo {
    font-family: var(--display);
    font-weight: 900; font-size: 40px; letter-spacing: -1px;
    background: linear-gradient(120deg, var(--ember-2), var(--ember), var(--rose));
    -webkit-background-clip: text; background-clip: text; color: transparent;
    line-height: 1;
  }
  .logo .spark { display: inline-block; animation: flicker 2.4s ease-in-out infinite; }
  .tag { color: var(--muted); font-size: 13px; letter-spacing: 2px; text-transform: uppercase; margin-top: 6px; }

  /* stat ring + cards */
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px; }
  .stat {
    background: var(--glass); border: 1px solid var(--glass-brd);
    border-radius: 18px; padding: 14px 10px; text-align: center;
    backdrop-filter: blur(12px); animation: rise .7s ease both;
  }
  .stat:nth-child(2) { animation-delay: .08s; }
  .stat:nth-child(3) { animation-delay: .16s; }
  .stat .num { font-family: var(--display); font-weight: 600; font-size: 24px; color: var(--ember-2); }
  .stat .lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }
  .stat .num.down { color: #6fe0a0; }
  .stat .num.up { color: var(--rose); }

  /* card */
  .card {
    background: linear-gradient(180deg, rgba(255,244,230,0.07), rgba(255,244,230,0.04)), rgba(40,22,12,0.55);
    border: 1px solid rgba(255,244,230,0.18);
    border-radius: 24px; padding: 20px; margin-bottom: 20px;
    backdrop-filter: blur(14px);
    box-shadow: 0 20px 60px -30px rgba(255,122,24,0.5);
    animation: rise .7s ease both .2s;
  }
  .card h2 {
    font-family: var(--display); font-weight: 600; font-size: 18px;
    margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
  }
  .card h2::before { content: ''; width: 6px; height: 18px; border-radius: 3px; background: linear-gradient(var(--ember-2), var(--ember)); }

  /* form */
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; letter-spacing: .5px; }
  .field input {
    width: 100%; font-family: var(--body); font-size: 17px; color: var(--cream);
    background: rgba(0,0,0,0.25); border: 1px solid var(--glass-brd);
    border-radius: 14px; padding: 14px 16px; outline: none;
    transition: border-color .25s, box-shadow .25s;
  }
  .field input:focus { border-color: var(--ember); box-shadow: 0 0 0 4px rgba(255,122,24,0.15); }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  button.save {
    width: 100%; margin-top: 4px; border: none; cursor: pointer;
    font-family: var(--body); font-weight: 600; font-size: 16px; color: #2a1404;
    padding: 15px; border-radius: 14px; position: relative; overflow: hidden;
    background: linear-gradient(120deg, var(--ember-2), var(--ember));
    box-shadow: 0 12px 30px -12px var(--ember);
    transition: transform .15s, box-shadow .2s;
  }
  button.save:active { transform: scale(.97); }
  button.save::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,.5), transparent);
    transform: translateX(-120%); 
  }
  button.save.flash::after { animation: sweep .7s ease; }

  /* chart */
  .chart-tabs { display: flex; gap: 8px; margin-bottom: 12px; }
  .chart-tabs button {
    flex: 1; background: rgba(0,0,0,.2); border: 1px solid var(--glass-brd);
    color: var(--muted); padding: 8px; border-radius: 10px; font-family: var(--body);
    font-size: 13px; cursor: pointer; transition: all .25s;
  }
  .chart-tabs button.on { background: linear-gradient(120deg, var(--ember-2), var(--ember)); color: #2a1404; border-color: transparent; font-weight: 600; }
  svg { width: 100%; height: 200px; display: block; overflow: visible; }
  .empty { text-align: center; color: var(--muted); padding: 40px 10px; font-size: 14px; }

  /* history */
  .hist-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 0; border-bottom: 1px solid rgba(255,244,230,.07);
    animation: rise .4s ease both;
  }
  .hist-item:last-child { border-bottom: none; }
  .hist-day { font-size: 13px; color: var(--muted); }
  .hist-vals { display: flex; gap: 14px; align-items: center; }
  .pill { font-size: 13px; }
  .pill b { color: var(--ember-2); font-weight: 600; }
  .pill.w b { color: var(--cream); }
  .del { background: none; border: none; color: var(--rose); font-size: 18px; cursor: pointer; opacity: .6; padding: 4px; }
  .del:active { opacity: 1; }

  .toast {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-160%);
    background: linear-gradient(120deg, var(--ember-2), var(--ember)); color: #2a1404;
    padding: 13px 22px; border-radius: 30px; font-weight: 600; font-size: 14px; z-index: 50;
    box-shadow: 0 16px 40px -12px var(--ember); transition: transform .45s cubic-bezier(.2,.9,.3,1.3);
    white-space: nowrap; max-width: 90vw;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ring progress */
  .ring-card { text-align: center; padding: 22px; }
  .ring-wrap { position: relative; width: 180px; height: 180px; margin: 0 auto; }
  .ring { width: 180px; height: 180px; transform: rotate(-90deg); }
  .ring-bg { fill: none; stroke: rgba(255,244,230,.08); stroke-width: 12; }
  .ring-fg {
    fill: none; stroke: url(#ringG); stroke-width: 12; stroke-linecap: round;
    stroke-dasharray: 377; stroke-dashoffset: 377;
    transition: stroke-dashoffset 1.1s cubic-bezier(.2,.9,.3,1);
  }
  .ring-fg.over { stroke: var(--rose); }
  .ring-fg.near { stroke: #ffd24a; }
  .ring-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .ring-pct { font-family: var(--display); font-weight: 900; font-size: 38px; line-height: 1; color: var(--cream); }
  .ring-sub { font-size: 12px; color: var(--muted); margin-top: 4px; letter-spacing: .5px; }
  .ring-meta { font-size: 12px; color: var(--muted); margin-top: 14px; }

  /* target input */
  .target-row { margin-top: 16px; padding-top: 16px; border-top: 1px solid rgba(255,244,230,.08); }
  .target-row label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; letter-spacing: .5px; }
  .target-input { display: flex; gap: 10px; }
  .target-input input {
    flex: 1; font-family: var(--body); font-size: 16px; color: var(--cream);
    background: rgba(0,0,0,.25); border: 1px solid var(--glass-brd);
    border-radius: 12px; padding: 12px 14px; outline: none; transition: border-color .25s, box-shadow .25s;
  }
  .target-input input:focus { border-color: var(--ember); box-shadow: 0 0 0 4px rgba(255,122,24,.15); }
  .set-target {
    border: none; cursor: pointer; font-family: var(--body); font-weight: 600; font-size: 14px;
    color: var(--cream); background: rgba(255,122,24,.18); border: 1px solid var(--ember);
    border-radius: 12px; padding: 0 20px; transition: transform .15s, background .2s;
  }
  .set-target:active { transform: scale(.95); }


  @keyframes rise { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: none; } }
  @keyframes sweep { to { transform: translateX(120%); } }
  @keyframes flicker { 0%,100%{ transform: rotate(0) scale(1); opacity:1; } 25%{ transform: rotate(-6deg) scale(1.1); opacity:.85; } 60%{ transform: rotate(4deg) scale(.96);} }
  @keyframes drawLine { to { stroke-dashoffset: 0; } }
  @keyframes popDot { from { r: 0; opacity: 0; } to { opacity: 1; } }
</style>
</head>
<body>
<canvas id="particles"></canvas>
<div class="wrap">
  <header>
    <div class="logo">Ember <span class="spark">🔥</span></div>
    <div class="tag">Daily Calorie Journal</div>
  </header>

  <div class="card ring-card">
    <div class="ring-wrap">
      <svg class="ring" viewBox="0 0 140 140">
        <defs>
          <linearGradient id="ringG" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#ffb347"/><stop offset="1" stop-color="#ff7a18"/>
          </linearGradient>
        </defs>
        <circle class="ring-bg" cx="70" cy="70" r="60" />
        <circle class="ring-fg" id="ring-fg" cx="70" cy="70" r="60" />
      </svg>
      <div class="ring-center">
        <div class="ring-pct" id="ring-pct">—</div>
        <div class="ring-sub" id="ring-sub">set a target</div>
      </div>
    </div>
    <div class="ring-meta" id="ring-meta">Today vs your daily goal</div>
  </div>

  <div class="stats">
    <div class="stat"><div class="num" id="s-avg">—</div><div class="lbl">Avg kcal</div></div>
    <div class="stat"><div class="num" id="s-weight">—</div><div class="lbl">Weight kg</div></div>
    <div class="stat"><div class="num" id="s-delta">—</div><div class="lbl">Change kg</div></div>
  </div>

  <div class="card">
    <h2>Log Today</h2>
    <div class="field">
      <label>Date</label>
      <input type="date" id="in-date" />
    </div>
    <div class="row">
      <div class="field"><label>Calories (kcal)</label><input type="number" id="in-cal" inputmode="numeric" placeholder="2100" /></div>
      <div class="field"><label>Weight (kg)</label><input type="number" id="in-weight" inputmode="decimal" step="0.1" placeholder="72.5" /></div>
    </div>
    <button class="save" id="save">Save Entry</button>

    <div class="target-row">
      <label>Daily target (kcal)</label>
      <div class="target-input">
        <input type="number" id="in-target" inputmode="numeric" placeholder="2000" />
        <button class="set-target" id="set-target">Set</button>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>Trend</h2>
    <div class="chart-tabs">
      <button class="on" data-metric="calories">Calories</button>
      <button data-metric="weight">Weight</button>
    </div>
    <div id="chart-box"><div class="empty">Log an entry to see your trend bloom into a chart.</div></div>
  </div>

  <div class="card">
    <h2>History</h2>
    <div id="history"><div class="empty">No entries yet.</div></div>
  </div>
</div>
<div class="toast" id="toast">Saved 🔥</div>

<script>
const $ = s => document.querySelector(s);
let DATA = [];
let metric = 'calories';
let TARGET = null;

// ---------- particles ----------
(function () {
  const c = $('#particles'), ctx = c.getContext('2d');
  let w, h, parts;
  function resize() {
    w = c.width = innerWidth; h = c.height = innerHeight;
    parts = Array.from({ length: Math.min(60, Math.floor(w / 8)) }, () => ({
      x: Math.random() * w, y: Math.random() * h,
      r: Math.random() * 2 + .6, s: Math.random() * .5 + .15,
      d: Math.random() * Math.PI * 2, a: Math.random() * .5 + .2
    }));
  }
  function tick() {
    ctx.clearRect(0, 0, w, h);
    for (const p of parts) {
      p.y -= p.s; p.x += Math.sin(p.d += .01) * .3;
      if (p.y < -10) { p.y = h + 10; p.x = Math.random() * w; }
      const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 4);
      g.addColorStop(0, `rgba(255,${140 + Math.random()*60|0},60,${p.a})`);
      g.addColorStop(1, 'rgba(255,90,30,0)');
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r * 4, 0, 7); ctx.fill();
    }
    requestAnimationFrame(tick);
  }
  addEventListener('resize', resize); resize(); tick();
})();

// ---------- chart ----------
function renderChart() {
  const box = $('#chart-box');
  if (DATA.length < 1) { box.innerHTML = '<div class="empty">Log an entry to see your trend bloom into a chart.</div>'; return; }
  const W = 440, H = 200, pad = 28;
  const vals = DATA.map(d => metric === 'calories' ? d.calories : d.weight);
  const min = Math.min(...vals), max = Math.max(...vals);
  const span = (max - min) || 1;
  const n = DATA.length;
  const x = i => pad + (n === 1 ? (W - 2*pad)/2 : i * (W - 2 * pad) / (n - 1));
  const y = v => H - pad - ((v - min) / span) * (H - 2 * pad);

  const pts = DATA.map((d, i) => [x(i), y(vals[i])]);
  const line = pts.map((p, i) => (i ? 'L' : 'M') + p[0].toFixed(1) + ' ' + p[1].toFixed(1)).join(' ');
  const area = line + ` L${pts[pts.length-1][0]} ${H-pad} L${pts[0][0]} ${H-pad} Z`;
  const stroke = metric === 'calories' ? 'url(#gC)' : 'url(#gW)';

  let svg = `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <defs>
      <linearGradient id="gC" x1="0" x2="1"><stop offset="0" stop-color="#ffb347"/><stop offset="1" stop-color="#ff5d73"/></linearGradient>
      <linearGradient id="gW" x1="0" x2="1"><stop offset="0" stop-color="#6fe0a0"/><stop offset="1" stop-color="#ffb347"/></linearGradient>
      <linearGradient id="fill" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="rgba(255,122,24,.28)"/><stop offset="1" stop-color="rgba(255,122,24,0)"/></linearGradient>
    </defs>`;
  // gridlines
  for (let g = 0; g <= 3; g++) {
    const gy = pad + g * (H - 2*pad)/3;
    svg += `<line x1="${pad}" x2="${W-pad}" y1="${gy}" y2="${gy}" stroke="rgba(255,244,230,.06)" stroke-width="1"/>`;
  }
  if (n > 1) svg += `<path d="${area}" fill="url(#fill)" opacity="0" style="animation:rise .8s ease forwards .4s"/>`;
  const len = 1400;
  svg += `<path d="${line}" fill="none" stroke="${stroke}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"
            stroke-dasharray="${len}" stroke-dashoffset="${len}" style="animation:drawLine 1.1s ease forwards"/>`;
  pts.forEach((p, i) => {
    svg += `<circle cx="${p[0]}" cy="${p[1]}" r="4.5" fill="#fff4e6" stroke="${metric==='calories'?'#ff7a18':'#6fe0a0'}" stroke-width="2"
              style="animation:popDot .4s ease forwards ${(.4 + i*0.06).toFixed(2)}s; opacity:0"/>`;
  });
  // garis target (cuma di chart kalori, kalo target di dalam rentang/sekitar)
  if (metric === 'calories' && TARGET) {
    let ty = y(TARGET);
    const clamped = ty < pad ? pad : ty > H - pad ? H - pad : ty;
    svg += `<line x1="${pad}" x2="${W-pad}" y1="${clamped}" y2="${clamped}" stroke="#6fe0a0" stroke-width="1.5" stroke-dasharray="5 5" opacity="0" style="animation:rise .6s ease forwards .6s"/>`;
    svg += `<text x="${W-pad}" y="${clamped - 5}" fill="#6fe0a0" font-size="10" font-family="Outfit" text-anchor="end" opacity="0" style="animation:rise .6s ease forwards .7s">target ${TARGET}</text>`;
  }
  // labels
  svg += `<text x="${pad}" y="14" fill="#c9a98f" font-size="11" font-family="Outfit">${max}${metric==='weight'?'kg':''}</text>`;
  svg += `<text x="${pad}" y="${H-6}" fill="#c9a98f" font-size="11" font-family="Outfit">${min}${metric==='weight'?'kg':''}</text>`;
  svg += `</svg>`;
  box.innerHTML = svg;
}

// ---------- stats ----------
function renderStats(s) {
  if (!s || !s.count) { $('#s-avg').textContent = '—'; $('#s-weight').textContent = '—'; $('#s-delta').textContent = '—'; return; }
  animateNum($('#s-avg'), s.avgCalories);
  $('#s-weight').textContent = s.latestWeight;
  const d = $('#s-delta');
  d.textContent = (s.weightDelta > 0 ? '+' : '') + s.weightDelta;
  d.className = 'num ' + (s.weightDelta < 0 ? 'down' : s.weightDelta > 0 ? 'up' : '');
}
function animateNum(el, target) {
  let cur = 0; const step = Math.max(1, Math.round(target / 28));
  const t = setInterval(() => { cur += step; if (cur >= target) { cur = target; clearInterval(t); } el.textContent = cur; }, 22);
}

// ---------- ring progress ----------
function renderRing() {
  const fg = $('#ring-fg'), pctEl = $('#ring-pct'), subEl = $('#ring-sub'), metaEl = $('#ring-meta');
  const CIRC = 377; // 2*pi*60
  // kalori hari ini (entry dengan tanggal = hari ini), kalau gak ada pakai entry terbaru
  const today = new Date().toISOString().slice(0, 10);
  const todayEntry = DATA.find(d => d.day === today) || DATA[DATA.length - 1];

  if (!TARGET) {
    fg.style.strokeDashoffset = CIRC;
    pctEl.textContent = '—'; subEl.textContent = 'set a target';
    metaEl.textContent = 'Set your daily goal below';
    fg.className = 'ring-fg';
    return;
  }
  if (!todayEntry) {
    fg.style.strokeDashoffset = CIRC;
    pctEl.textContent = '0%'; subEl.textContent = `0 / ${TARGET}`;
    metaEl.textContent = 'No entry yet today';
    fg.className = 'ring-fg';
    return;
  }

  const cal = todayEntry.calories;
  const pct = cal / TARGET;
  const shown = Math.min(pct, 1);
  fg.style.strokeDashoffset = CIRC * (1 - shown);
  fg.className = 'ring-fg' + (pct > 1 ? ' over' : pct >= 0.85 ? ' near' : '');

  pctEl.textContent = Math.round(pct * 100) + '%';
  subEl.textContent = `${cal} / ${TARGET}`;
  const isToday = todayEntry.day === today;
  const remaining = TARGET - cal;
  if (pct > 1) metaEl.textContent = `${Math.abs(remaining)} kcal over target` + (isToday ? '' : ' (latest entry)');
  else metaEl.textContent = `${remaining} kcal left` + (isToday ? ' today' : ' (latest entry)');
}

// ---------- history ----------
function renderHistory() {
  const box = $('#history');
  if (!DATA.length) { box.innerHTML = '<div class="empty">No entries yet.</div>'; return; }
  box.innerHTML = [...DATA].reverse().map((d, i) => `
    <div class="hist-item" style="animation-delay:${i*0.04}s">
      <span class="hist-day">${fmt(d.day)}</span>
      <span class="hist-vals">
        <span class="pill"><b>${d.calories}</b> kcal</span>
        <span class="pill w"><b>${d.weight}</b> kg</span>
        <button class="del" data-day="${d.day}">✕</button>
      </span>
    </div>`).join('');
  box.querySelectorAll('.del').forEach(b => b.onclick = () => del(b.dataset.day));
}
function fmt(s) { const d = new Date(s + 'T00:00'); return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' }); }

// ---------- api ----------
async function load() {
  DATA = await (await fetch('/api/entries')).json();
  const s = await (await fetch('/api/stats')).json();
  TARGET = s.target || null;
  if (TARGET && !$('#in-target').value) $('#in-target').value = TARGET;
  renderStats(s); renderChart(); renderHistory(); renderRing();
}
async function setTarget() {
  const t = $('#in-target').value;
  if (!t) return toast('Masukin angka target', true);
  const r = await fetch('/api/target', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ target: t }) });
  if (!r.ok) { const e = await r.json(); return toast(e.error || 'Target invalid', true); }
  await load(); toast('Target tersimpan 🎯');
}
async function save() {
  const cal = $('#in-cal').value, weight = $('#in-weight').value, day = $('#in-date').value;
  if (!cal || !weight) return toast('Enter calories & weight', true);
  const btn = $('#save'); btn.classList.add('flash'); setTimeout(() => btn.classList.remove('flash'), 700);
  const r = await fetch('/api/entries', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ day, calories: cal, weight }) });
  if (!r.ok) return toast('Invalid values', true);
  $('#in-cal').value = ''; $('#in-weight').value = '';
  await load(); toast('Saved 🔥');
}
async function del(day) {
  await fetch('/api/entries/' + day, { method: 'DELETE' });
  await load(); toast('Removed');
}

let tt;
function toast(msg, err) {
  const t = $('#toast'); t.textContent = msg; t.style.background = err ? 'linear-gradient(120deg,#ff5d73,#ff7a18)' : '';
  t.classList.add('show'); clearTimeout(tt); tt = setTimeout(() => t.classList.remove('show'), 1800);
}

// ---------- init ----------
$('#in-date').value = new Date().toISOString().slice(0, 10);
$('#save').onclick = save;
$('#set-target').onclick = setTarget;
document.querySelectorAll('.chart-tabs button').forEach(b => b.onclick = () => {
  document.querySelectorAll('.chart-tabs button').forEach(x => x.classList.remove('on'));
  b.classList.add('on'); metric = b.dataset.metric; renderChart();
});
load();
</script>
</body>
</html>
